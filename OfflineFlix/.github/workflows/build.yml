name: Build & Release OfflineFlix APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      - name: إعداد Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: إعداد Android SDK
        uses: android-actions/setup-android@v3

      - name: تخزين مؤقت لـ Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: تعيين صلاحيات gradlew
        run: chmod +x ./gradlew

      - name: بناء Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: تشغيل الاختبارات
        run: ./gradlew test --no-daemon

      - name: إعداد مفتاح التوقيع
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > $RUNNER_TEMP/keystore.jks
          echo "KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> $GITHUB_ENV

      - name: بناء Release APK (عند الوسم فقط)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: بناء Universal APK الكامل
        if: startsWith(github.ref, 'refs/tags/')
        run: ./gradlew :app:packageReleaseUniversalApk --no-daemon || true

      - name: تسمية الـ APK
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -1 | grep -oP '"\K[^"]+')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          # Debug APK
          find . -name "*debug*.apk" -exec cp {} OfflineFlix-v${VERSION_NAME}-debug.apk \; || true
          # Release APK
          find . -name "*release*.apk" -exec cp {} OfflineFlix-v${VERSION_NAME}-release.apk \; || true

      - name: رفع Debug APK كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OfflineFlix-Debug-APK
          path: '*.apk'
          retention-days: 30

      - name: إنشاء Release على GitHub
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.apk'
          generate_release_notes: true
          body: |
            ## OfflineFlix ${{ env.VERSION_NAME }} 🎬
            
            ### ما الجديد:
            - مشغل فيديو كامل مع إيماءات متقدمة
            - مشغل موسيقى Spotify-style
            - قارئ PDF
            - محرر FFmpeg
            - محول صيغ شامل (+400 صيغة)
            
            ### تعليمات التثبيت:
            1. حمّل `OfflineFlix-v${{ env.VERSION_NAME }}-release.apk`
            2. افتح الملف على هاتفك (تأكد من تفعيل "مصادر غير معروفة")
            3. اضغط تثبيت
            
            ### المتطلبات:
            - Android 8.0 أو أحدث
            - 100% أوفلاين - لا إنترنت مطلوب 🔒
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: تشغيل Lint
        run: ./gradlew lint --no-daemon
      - name: رفع نتائج Lint
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html
