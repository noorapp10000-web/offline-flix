name: Build & Release OfflineFlix APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

defaults:
  run:
    working-directory: OfflineFlix

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      - name: إعداد Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: تخزين مؤقت لـ Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            OfflineFlix/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('OfflineFlix/**/*.gradle*', 'OfflineFlix/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: تعيين صلاحيات gradlew
        run: chmod +x ./gradlew

      - name: بناء Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: تشغيل اختبارات الوحدة
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: تسمية Debug APK
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -1 | grep -oP '"\K[^"]+')
          echo "VERSION_NAME=${VERSION_NAME:-1.0}" >> $GITHUB_ENV
          find . -name "*debug*.apk" | head -1 | xargs -I{} cp {} ../OfflineFlix-v${VERSION_NAME:-1.0}-debug.apk || true
        working-directory: OfflineFlix

      - name: رفع Debug APK كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OfflineFlix-Debug-APK-${{ github.run_number }}
          path: OfflineFlix-*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: توليد QR Code لرابط التحميل
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          pip install qrcode[pil] --quiet
          python3 - << 'PYEOF'
          import qrcode, os
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          url = f"https://github.com/{repo}/actions/runs/{run_id}"
          qr = qrcode.make(url)
          qr.save("offlineflix-download-qr.png")
          print(f"QR generated for: {url}")
          PYEOF
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: رفع QR Code كـ Artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: QR-Download-Link
          path: offlineflix-download-qr.png
          retention-days: 30

      # ==================== Release (عند الوسم v* فقط) ====================

      - name: إعداد مفتاح التوقيع
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > $RUNNER_TEMP/keystore.jks
          echo "KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> $GITHUB_ENV

      - name: بناء Release APK الموقّع
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: تجميع ملفات Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          find . -name "*release*.apk" | head -1 | xargs -I{} cp {} ../OfflineFlix-v${{ env.VERSION_NAME }}-release.apk || true
        working-directory: OfflineFlix

      - name: إنشاء GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OfflineFlix-*.apk
            offlineflix-download-qr.png
          generate_release_notes: true
          body: |
            ## OfflineFlix ${{ env.VERSION_NAME }} 🎬

            ### المميزات:
            - 🎬 مشغل فيديو بإيماءات متقدمة (ExoPlayer)
            - 🎵 مشغل موسيقى Spotify-style مع Equalizer
            - 📄 قارئ PDF مع شريط تصفح
            - ✂️ محرر فيديو FFmpeg كامل
            - 🔄 محول صيغ (+400 صيغة)
            - 🗑️ سلة محذوفات مع استعادة
            - 📶 100% أوفلاين - لا إنترنت مطلوب

            ### تعليمات التثبيت:
            1. حمّل `OfflineFlix-v${{ env.VERSION_NAME }}-release.apk`
            2. افتح الملف على هاتفك
            3. فعّل "تثبيت من مصادر غير معروفة" ثم اضغط تثبيت

            ### المتطلبات:
            - Android 8.0 (API 26) أو أحدث
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: تعيين صلاحيات gradlew
        run: chmod +x ./gradlew
        working-directory: OfflineFlix

      - name: تشغيل Lint
        run: ./gradlew lintDebug --no-daemon
        working-directory: OfflineFlix

      - name: رفع نتائج Lint
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: OfflineFlix/app/build/reports/lint-results-debug.html
          if-no-files-found: warn
