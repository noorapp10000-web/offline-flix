name: Build & Release OfflineFlix APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      - name: إعداد Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: تخزين مؤقت لـ Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            OfflineFlix/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('OfflineFlix/**/*.gradle*', 'OfflineFlix/**/libs.versions.toml', 'OfflineFlix/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: تعيين صلاحيات gradlew
        working-directory: OfflineFlix
        run: chmod +x ./gradlew

      - name: بناء Debug APK
        working-directory: OfflineFlix
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

      - name: رفع Debug APK كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OfflineFlix-Debug-APK-${{ github.run_number }}
          path: OfflineFlix/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      # ==================== Release (عند الوسم v* فقط) ====================

      - name: إعداد مفتاح التوقيع
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 --decode > $RUNNER_TEMP/keystore.jks
          echo "KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> $GITHUB_ENV

      - name: بناء Release APK الموقّع
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: OfflineFlix
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"
        run: ./gradlew assembleRelease --no-daemon

      - name: رفع Release APK كـ Artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: OfflineFlix-Release-APK-${{ github.run_number }}
          path: OfflineFlix/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: إنشاء GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OfflineFlix/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          body: |
            ## OfflineFlix ${{ github.ref_name }} 🎬

            ### المميزات:
            - 🎬 مشغل فيديو بإيماءات متقدمة (ExoPlayer)
            - 🎵 مشغل موسيقى مع Equalizer
            - 📄 قارئ PDF مع شريط تصفح
            - ✂️ محرر فيديو FFmpeg كامل
            - 🔄 محول صيغ (+400 صيغة)
            - 🗑️ سلة محذوفات مع استعادة
            - 📶 100% أوفلاين - لا إنترنت مطلوب

            ### تعليمات التثبيت:
            1. حمّل ملف الـ APK من الأسفل
            2. افتح الملف على هاتفك
            3. فعّل "تثبيت من مصادر غير معروفة" ثم اضغط تثبيت

            ### المتطلبات:
            - Android 8.0 (API 26) أو أحدث
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: تعيين صلاحيات gradlew
        working-directory: OfflineFlix
        run: chmod +x ./gradlew

      - name: تشغيل Lint
        working-directory: OfflineFlix
        run: ./gradlew lintDebug --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

      - name: رفع نتائج Lint
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: OfflineFlix/app/build/reports/lint-results-debug.html
          if-no-files-found: warn
